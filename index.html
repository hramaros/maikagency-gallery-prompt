<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f59e0b" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0b" />
  <title>AI Photo Gallery — Prompts & Images | Maikagency</title>
  <meta name="description" content="Galerie d'images IA avec leurs prompts de génération, alimentée par Google Sheets via n8n. Un projet Maikagency." />
  <link rel="icon" href="https://www.maikagency.dev/favicon-32x32.ico" />
  <link rel="icon" href="https://www.maikagency.dev/favicon-16x16.ico" sizes="16x16" />
  <link rel="apple-touch-icon" href="https://www.maikagency.dev/favicon-180x180.ico" />
  <link rel="preconnect" href="https://lh3.googleusercontent.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-decor" aria-hidden="true">
    <div class="grid-background"></div>
    <div class="gradient-orb gradient-orb-1"></div>
    <div class="gradient-orb gradient-orb-2"></div>
    <div class="gradient-orb gradient-orb-3"></div>
  </div>

  <header class="site-header">
    <div class="brand">
      <a class="brand-logo" href="https://www.maikagency.dev" target="_blank" rel="noopener" aria-label="Maikagency">
        <img src="https://www.maikagency.dev/images/maikagency-no-bg.png" alt="" width="36" height="36" loading="lazy" />
      </a>
      <h1>AI Photo<span class="gradient-text">Gallery</span></h1>
    </div>
    <div class="header-tools">
      <input id="search" type="search" placeholder="Rechercher un prompt…" autocomplete="off" />
      <button id="refresh" class="btn-icon" title="Rafraîchir" aria-label="Rafraîchir">⟳</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <h2>Des images, des prompts, une <span class="gradient-text">galerie vivante</span>.</h2>
      <p>Chaque image déposée sur Drive est analysée par une IA qui en déduit le prompt de
        régénération, puis publiée ici automatiquement.</p>
      <div id="stats" class="stats" hidden></div>
    </section>

    <nav id="filters" class="filters" aria-label="Filtrer par catégorie" hidden></nav>

    <section id="gallery" class="gallery" aria-live="polite"></section>

    <div id="state" class="state"></div>
  </main>

  <footer class="site-footer">
    <span>Propulsé par n8n + Google Sheets · <a id="apiLink" href="#" target="_blank" rel="noopener">API</a></span>
    <span> · </span>
    <a href="https://www.maikagency.dev" target="_blank" rel="noopener">Un projet <strong class="gradient-text">Maikagency</strong></a>
  </footer>

  <!-- Lightbox -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lightbox-close" aria-label="Fermer">✕</button>
    <figure class="lightbox-content" role="dialog" aria-modal="true">
      <img id="lb-img" alt="" />
      <figcaption>
        <p id="lb-prompt" class="lb-prompt"></p>
        <div class="lb-meta">
          <span id="lb-cat" class="lb-cat" hidden></span>
          <span id="lb-date"></span>
          <button id="lb-copy" class="btn">Copier le prompt</button>
        </div>
      </figcaption>
    </figure>
  </div>

  <!-- Card template -->
  <template id="card-tpl">
    <article class="card">
      <div class="card-media">
        <img loading="lazy" alt="" />
        <span class="card-cat" hidden></span>
        <button class="card-copy" title="Copier le prompt">⧉</button>
      </div>
      <p class="card-prompt"></p>
    </article>
  </template>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
